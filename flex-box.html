<!DOCTYPE html>
<html lang="en">
<head>   
    <title>flex-box</title>
    <style>
        .box{
            height: 150px;
            border:3px solid black;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
        }
        .box-1{
            height: 150px;
            border: 3px solid black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="box">
        <div>ajayip</div>
    </div>
    <br><br>
    <!--2-tapsirma-->
    <div class="box-1">
        <div style="background-color: lightblue;">element-1</div>
        <div style="background-color: lightcoral;">element-2</div>
        <div style="background-color: lightblue;">element-3</div>

    </div>
</body>
</html>
